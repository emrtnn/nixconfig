# ---- Window rules -----------------------------------------------------------
# Mango rule to ignore client maximize requests.
windowrule=ignore_maximize:1,appid:.*

# Floating app rules.
windowrule=isfloating:1,appid:^swappy$
windowrule=isfloating:1,width:900,height:800,appid:localsend
windowrule=isfloating:1,width:600,height:1050,appid:^org\.telegram\.desktop$

# Privacy/screen-share blocking is not exposed in Mango rules. Keep Bitwarden
# otherwise native and avoid extra visual effects for it.
windowrule=noblur:1,appid:^Bitwarden$

# ---- Layer rules ------------------------------------------------------------
# Noctalia integration: keep wallpaper/background layers clean and performant.
layerrule=noanim:1,noblur:1,noshadow:1,layer_name:^noctalia-wallpaper
layerrule=animation_type_open:slide,animation_type_close:fade,layer_name:^noctalia-background
layerrule=animation_type_open:zoom,animation_type_close:zoom,layer_name:rofi
layerrule=noanim:1,noblur:1,layer_name:selection

