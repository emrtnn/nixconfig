# Mango configuration.
# Docs: mangowm configuration/bindings/visuals/rules and Noctalia Mango keybind examples.

# ---- Session/environment ----------------------------------------------------
env=NIXOS_OZONE_WL,1
env=GDK_BACKEND,wayland,x11,*
env=QT_QPA_PLATFORM,wayland;xcb
env=SDL_VIDEODRIVER,wayland
env=CLUTTER_BACKEND,wayland

# Noctalia owns wallpaper, panels, notifications, OSD, idle/lock UI, launcher,
# control center, and screen-recorder UI in this setup.
exec-once=noctalia-shell -q

# ---- Monitors ---------------------------------------------------------------
# Main desktop output. Other outputs use Mango defaults.
monitorrule=name:^DP-1$,width:2560,height:1440,refresh:239.970,x:0,y:0,scale:1

# ---- Window effects / looks -------------------------------------------------
# Window styling.
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=3
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=1
layer_shadows=0
shadow_only_floating=1
shadows_size=4
shadows_blur=12
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x1a1a1aee

border_radius=1
# border_radius_location_default is documented upstream but unsupported by the
# packaged Mango build currently in this flake.
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.95

# Mango native appearance knobs.
gappih=3
gappiv=3
gappoh=12
gappov=12
borderpx=3
rootcolor=0x201b14ff
bordercolor=0x595959aa
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xd79921ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff
cursor_size=24
cursor_theme=Bibata-Modern-Ice

# ---- Animations -------------------------------------------------------------
# Mango-native animation tuning.
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=300
animation_duration_open=320
animation_duration_tag=250
animation_duration_close=280
animation_duration_focus=0
animation_curve_open=0.07,0.88,0.04,0.99
animation_curve_move=0.05,0.85,0.03,0.97
animation_curve_tag=0.05,0.82,0,1
animation_curve_close=0,0.48,0.38,1
animation_curve_focus=1,1,1,1
animation_curve_opafadein=0.05,0.80,0.10,0.97
animation_curve_opafadeout=0.20,0,0.82,0.10

# ---- Layouts ----------------------------------------------------------------
# Use Mango's native dwindle layout per tag, with quick cycling to other useful
# Mango layouts.
circle_layout=dwindle,tile,scroller,monocle
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle.
dwindle_split_ratio=0.5
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=2
dwindle_vsplit=1
dwindle_preserve_split=0
dwindle_smart_resize=0

# Scroller is kept configured because it is a strong Mango-native feature and is
# available via Super+N / explicit layout binds.
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
scroller_prefer_overspread=1
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Tags are Mango's workspace equivalent. Mango supports tags 1-9; Super+0 below
# is mapped to Mango's native “view all tags”.
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ---- Overview / misc / input ------------------------------------------------
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1
drag_tile_small=1

repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us
xkb_rules_variant=altgr-intl

mouse_natural_scrolling=0
mouse_accel_speed=0.35
trackpad_natural_scrolling=1
trackpad_accel_speed=0.35
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
scroll_method=4
scroll_button=274

# ---- Window rules -----------------------------------------------------------
# Mango rule to ignore client maximize requests.
windowrule=ignore_maximize:1,appid:.*

# Floating app rules.
windowrule=isfloating:1,appid:^swappy$
windowrule=isfloating:1,width:900,height:800,appid:localsend
windowrule=isfloating:1,width:600,height:1050,appid:^org\.telegram\.desktop$

# Privacy/screen-share blocking is not exposed in Mango rules. Keep Bitwarden
# otherwise native and avoid extra visual effects for it.
windowrule=noblur:1,appid:^Bitwarden$

# ---- Layer rules ------------------------------------------------------------
# Noctalia integration: keep wallpaper/background layers clean and performant.
layerrule=noanim:1,noblur:1,noshadow:1,layer_name:^noctalia-wallpaper
layerrule=animation_type_open:slide,animation_type_close:fade,layer_name:^noctalia-background
layerrule=animation_type_open:zoom,animation_type_close:zoom,layer_name:rofi
layerrule=noanim:1,noblur:1,layer_name:selection

# ---- Key bindings -----------------------------------------------------------
# Common / session
bind=SUPER+ALT,R,reload_config
bind=SUPER+SHIFT,Escape,spawn,noctalia-shell ipc call lockScreen lock
bind=SUPER+SHIFT,Q,quit

# Core apps
bind=SUPER,Return,spawn,foot
bind=SUPER,Q,killclient
bind=SUPER,F,spawn,nautilus --new-window
bind=SUPER+SHIFT,F,spawn,footclient --app-id monad.yazi -e yazi

# Noctalia controls. Use the installed Noctalia CLI directly so the binds work
# across compositors without relying on a separate qs invocation.
bind=SUPER,space,spawn,noctalia-shell ipc call launcher toggle
bind=SUPER+SHIFT,V,spawn,noctalia-shell ipc call launcher clipboard
bind=SUPER,comma,spawn,noctalia-shell ipc call settings toggle
bind=SUPER+SHIFT,Return,spawn,noctalia-shell ipc call controlCenter toggle
bind=SUPER,period,spawn,noctalia-shell ipc call launcher emoji
bind=SUPER,R,spawn,noctalia-shell ipc call plugin:screen-recorder toggle

# Universal copy/paste/cut approximation using wtype (Mango has no native
# send-shortcut dispatcher in the docs).
bind=SUPER,C,spawn,wtype -M ctrl -k Insert
bind=SUPER,V,spawn,wtype -M shift -k Insert
bind=SUPER,X,spawn,wtype -M ctrl -k X

# Common app shortcuts
bind=SUPER,B,spawn,helium
bind=SUPER+ALT,B,spawn,helium --incognito
bind=SUPER+SHIFT,slash,spawn,bitwarden
bind=SUPER+SHIFT,X,spawn,helium --app=https://x.com
bind=SUPER,W,spawn,helium --app=https://web.whatsapp.com
bind=SUPER,A,spawn,helium --app=https://chatgpt.com
bind=SUPER+SHIFT,A,spawn,helium --app=https://gemini.google.com
bind=SUPER,E,spawn,thunderbird
bind=SUPER+SHIFT,T,spawn,Telegram
bind=SUPER,G,spawn,helium --app=https://calendar.google.com
bind=SUPER,Y,spawn,helium --app=https://youtube.com
bind=SUPER,N,spawn,helium --app=https://notion.so
bind=SUPER+SHIFT,Y,spawn,google-chrome-stable --app=https://primevideo.com

# Focus / movement
bind=SUPER,H,focusdir,left
bind=SUPER,L,focusdir,right
bind=SUPER,K,focusdir,up
bind=SUPER,J,focusdir,down
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,Tab,focusstack,next

bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,L,exchange_client,right
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Resize floating windows / layout split in Mango units.
bind=SUPER+ALT,H,resizewin,-160,+0
bind=SUPER+ALT,L,resizewin,+160,+0
bind=SUPER+ALT,K,resizewin,+0,-160
bind=SUPER+ALT,J,resizewin,+0,+160

# Tiling/window state controls
bind=SUPER,T,togglefloating
bind=SUPER,F5,togglefullscreen
bind=SUPER,P,switch_proportion_preset
bind=SUPER,O,dwindle_toggle_split_direction
bind=SUPER+ALT,O,dwindle_split_horizontal
bind=SUPER+ALT+SHIFT,O,dwindle_split_vertical
bind=SUPER+CTRL,N,switch_layout
bind=SUPER+ALT,N,setlayout,scroller
bind=SUPER+ALT+SHIFT,N,setlayout,dwindle
bind=SUPER+ALT+CTRL,N,setlayout,tile

# Scratchpad.
bind=SUPER,grave,toggle_scratchpad
bind=SUPER+SHIFT,grave,minimized
bind=SUPER+CTRL,grave,restore_minimized

# Tags/workspaces. Mango has tags 1-9; 0 = view all tags.
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER,0,view,0,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
bind=SUPER+SHIFT,0,toggletag,0

bind=SUPER+CTRL,Left,tagtoleft,0
bind=SUPER+CTRL,Right,tagtoright,0

# Screenshots / color picker
bind=SUPER,S,spawn_shell,bash -lc 'grim -g "$(slurp -w 0)" -t png - | tee >(wl-copy) | swappy -f -'
bind=SUPER+SHIFT,S,spawn_shell,bash -lc 'grim -t png - | tee >(wl-copy) | swappy -f -'
bind=SUPER+SHIFT,P,spawn,hyprpicker -a
bind=NONE,Print,spawn_shell,grim -g "$(slurp -d)" - | wl-copy
bind=SHIFT,Print,spawn_shell,mkdir -p "$HOME/Pictures/Screenshots" && grim "$HOME/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png"

# Media keys. These use Noctalia IPC where documented so OSD/shell state stays
# in sync; playback stays direct through playerctl.
bindl=NONE,XF86AudioRaiseVolume,spawn,noctalia-shell ipc call volume increase
bindl=NONE,XF86AudioLowerVolume,spawn,noctalia-shell ipc call volume decrease
bindl=NONE,XF86AudioMute,spawn,noctalia-shell ipc call volume muteOutput
bindl=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl=NONE,XF86MonBrightnessUp,spawn,noctalia-shell ipc call brightness increase
bindl=NONE,XF86MonBrightnessDown,spawn,noctalia-shell ipc call brightness decrease
bindl=NONE,XF86AudioNext,spawn,playerctl next
bindl=NONE,XF86AudioPause,spawn,playerctl play-pause
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause
bindl=NONE,XF86AudioPrev,spawn,playerctl previous

# Mouse / axis / gestures
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
gesturebind=NONE,left,3,focusdir,left
gesturebind=NONE,right,3,focusdir,right
gesturebind=NONE,up,3,focusdir,up
gesturebind=NONE,down,3,focusdir,down
gesturebind=NONE,left,4,viewtoleft_have_client
gesturebind=NONE,right,4,viewtoright_have_client
gesturebind=NONE,up,4,toggleoverview
gesturebind=NONE,down,4,toggleoverview
